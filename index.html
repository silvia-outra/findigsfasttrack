<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Findigs Spring Onsite 2026 — Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #F5F3EC;
      --forest: #212B14;
      --n90: #3D3D3A;
      --n60: #6B6B67;
      --surface: #FFFFFF;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--sand);
      color: var(--forest);
      min-height: 100vh;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 0 4rem;
    }

    /* ── Header ── */
    .header {
      padding: 1.75rem 1.5rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(33,43,20,0.12);
    }
    .logo svg { height: 28px; width: auto; }
    .header-right { text-align: right; }
    .header-right h1 { font-size: 14px; font-weight: 600; color: var(--forest); }
    .header-right p  { font-size: 12px; color: var(--n60); margin-top: 3px; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(33,43,20,0.08);
    }
    .litem {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--n90);
      background: var(--surface);
      border-radius: 20px;
      padding: 4px 10px;
      border: 1px solid rgba(33,43,20,0.12);
    }
    .ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Day tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 1rem 1.5rem 0;
    }
    .tab {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      background: transparent;
      border: 1.5px solid rgba(33,43,20,0.25);
      border-radius: 20px;
      color: var(--forest);
      transition: background 0.15s, color 0.15s;
    }
    .tab.active  { background: var(--forest); color: #fff; border-color: var(--forest); }
    .tab:hover:not(.active) { background: rgba(33,43,20,0.06); }

    /* ── Day panels ── */
    .day-panel { display: none; padding: 1.25rem 1.5rem; }
    .day-panel.active { display: block; }

    /* ── Events ── */
    .events { display: flex; flex-direction: column; gap: 6px; }
    .event  { display: flex; gap: 10px; align-items: flex-start; }

    .time-col {
      min-width: 92px;
      padding-top: 10px;
      font-size: 11px;
      color: var(--n60);
      flex-shrink: 0;
      font-weight: 500;
      line-height: 1.4;
    }

    .ec {
      flex: 1;
      border-radius: 10px;
      padding: 9px 13px;
      border-left: 3px solid transparent;
    }

    /* Color coding using brand secondary palette */
    .ec.work     { background: rgba(173,210,255,0.35); border-left-color: #ADD2FF; }
    .ec.workshop { background: rgba(34,195,134,0.18);  border-left-color: #22C386; }
    .ec.speaker  { background: rgba(255,206,89,0.30);  border-left-color: #FFCE59; }
    .ec.plenary  { background: rgba(243,179,241,0.30); border-left-color: #F3B3F1; }
    .ec.social,
    .ec.meal     { background: rgba(255,162,122,0.30); border-left-color: #FFA27A; }
    .ec.break    { background: rgba(221,200,201,0.35); border-left-color: #DDC8C9; }

    .en { font-size: 13px; font-weight: 600; line-height: 1.35; }
    .en.work     { color: #1a3d5c; }
    .en.workshop { color: #0e4d35; }
    .en.speaker  { color: #5c4200; }
    .en.plenary  { color: #5c1a5a; }
    .en.social,
    .en.meal     { color: #5c2200; }
    .en.break    { color: #4a3435; }

    .emeta  { font-size: 11.5px; margin-top: 3px; color: var(--n60); line-height: 1.5; }
    .elead  { font-style: italic; }

    /* ── Loading / error states ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 12px;
      color: var(--n60);
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(33,43,20,0.15);
      border-top-color: var(--forest);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--n60);
      background: none;
      border: 1px solid rgba(33,43,20,0.18);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(33,43,20,0.06); }
    .refresh-btn svg { width: 12px; height: 12px; }

    .last-updated {
      font-size: 11px;
      color: var(--n60);
      padding: 0.5rem 1.5rem;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(33,43,20,0.06);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .time-col { min-width: 74px; }
      .tabs { gap: 4px; }
      .tab { padding: 7px 12px; font-size: 11px; }
    }
  </style>
</head>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const SHEET_ID  = '1GTWd_1R94wB-XmQfarj17xO-Pigd6QpFa-ovyYa_pp8';
  const GID       = '1292498457';
  const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  // ── State ───────────────────────────────────────────────────────────────────
  let activeDay   = 'tue';
  let parsedDays  = { tue: [], wed: [], thu: [] };

  // ── Classify an event into a CSS type ───────────────────────────────────────
  function classify(name, notes) {
    const n = (name + ' ' + notes).toLowerCase();
    if (/breakfast|lunch|dinner|meal/i.test(n))          return 'meal';
    if (/break(?!out)|reset|flex|catch.up|transition|swag/i.test(n)) return 'break';
    if (/icebreaker|energizer/i.test(n))                  return 'break';
    if (/workshop|skills.build|showcase/i.test(n))        return 'workshop';
    if (/findigsx|work block|strategize|breakout|share.out|presentation prep/i.test(n)) return 'work';
    if (/speaker|confirmed|fireside|josh lin|hugh frater|liz tran|eli wachs/i.test(n)) return 'speaker';
    if (/kickoff|wrap|intro|plenary|synthesis|closing|leadership|value reset|intra.team/i.test(n)) return 'plenary';
    return 'break';
  }

  // ── Parse CSV rows into day buckets ─────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const days  = { tue: [], wed: [], thu: [] };
    let current = null;

    for (const line of lines) {
      // Simple CSV split respecting quoted fields
      const cols = splitCSV(line);
      const [, timeRaw, eventRaw, who, notes] = cols.map(c => c.trim());

      if (/tuesday/i.test(timeRaw))   { current = 'tue'; continue; }
      if (/wednesday/i.test(timeRaw)) { current = 'wed'; continue; }
      if (/thursday/i.test(timeRaw))  { current = 'thu'; continue; }

      if (!current || !timeRaw || !eventRaw) continue;
      if (/time|event type|color key|findigs|workshops|plenary|speakers|social|break/i.test(timeRaw) && !timeRaw.includes('–') && !timeRaw.includes('-')) continue;

      const time  = timeRaw.replace(/\s/g, '');
      const event = eventRaw.replace(/\n/g, ' ').trim();
      const lead  = (who || '').replace(/\n/g, ' / ').trim();
      const note  = (notes || '').replace(/\n/g, ' ').trim();

      if (!time.match(/\d/)) continue; // skip non-time rows

      days[current].push({ time, event, lead, note, type: classify(event, note) });
    }
    return days;
  }

  function splitCSV(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  // ── Render a list of events ──────────────────────────────────────────────────
  function renderEvents(events) {
    if (!events.length) return '<p style="padding:2rem 0;color:var(--n60);font-size:13px;">No events found for this day.</p>';
    return '<div class="events">' + events.map(ev => `
      <div class="event">
        <div class="time-col">${ev.time}</div>
        <div class="ec ${ev.type}">
          <div class="en ${ev.type}">${ev.event}</div>
          ${ev.lead || ev.note ? `<div class="emeta">${ev.lead ? `<span class="elead">${ev.lead}</span>` : ''}${ev.lead && ev.note ? ' · ' : ''}${ev.note || ''}</div>` : ''}
        </div>
      </div>`).join('') + '</div>';
  }

  // ── Build full content HTML ──────────────────────────────────────────────────
  function renderContent() {
    return `
      <div id="tue"  class="day-panel ${activeDay==='tue'?'active':''}">${renderEvents(parsedDays.tue)}</div>
      <div id="wed"  class="day-panel ${activeDay==='wed'?'active':''}">${renderEvents(parsedDays.wed)}</div>
      <div id="thu"  class="day-panel ${activeDay==='thu'?'active':''}">${renderEvents(parsedDays.thu)}</div>`;
  }

  // ── Tab switching ────────────────────────────────────────────────────────────
  function showDay(id, btn) {
    activeDay = id;
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const panel = document.getElementById(id);
    if (panel) panel.classList.add('active');
    btn.classList.add('active');
  }

  // ── Fetch & render ───────────────────────────────────────────────────────────
  async function loadSchedule() {
    document.getElementById('last-updated-text').textContent = 'Refreshing…';
    document.getElementById('content').innerHTML =
      '<div class="state"><div class="spinner"></div><span>Fetching schedule…</span></div>';

    try {
      const res  = await fetch(CSV_URL + '&cachebust=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      parsedDays = parseCSV(text);
      document.getElementById('content').innerHTML = renderContent();

      const now = new Date();
      document.getElementById('last-updated-text').textContent =
        'Last updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div class="state">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
          </svg>
          <span>Couldn't load the schedule.<br>Make sure the Google Sheet is set to <strong>Anyone with the link can view</strong>.</span>
          <button class="refresh-btn" onclick="loadSchedule()" style="margin:0">Try again</button>
        </div>`;
      document.getElementById('last-updated-text').textContent = 'Failed to load';
    }
  }

  loadSchedule();
</script>
</body>
</html>
